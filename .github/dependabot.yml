version: 2
updates:

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: friday
    open-pull-requests-limit: 8
    labels:
      - "📦 Dependencies"
    assignees:
      - lissy93
    commit-message:
      prefix: "⬆️"
      prefix-development: "⬆️ "
      include: scope
    versioning-strategy: increase
    groups:
      vue-ecosystem:
        patterns:
          - "vue*"
          - "@vue/*"
          - "v-*"
        update-types:
          - minor
          - patch
      babel:
        patterns:
          - "@babel/*"
        update-types:
          - minor
          - patch
      eslint:
        patterns:
          - "eslint*"
          - "@vue/eslint-*"
        update-types:
          - minor
          - patch
      sentry:
        patterns:
          - "@sentry/*"
        update-types:
          - minor
          - patch
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - minor
          - patch
      minor-and-patch:
        update-types:
          - minor
          - patch
      npm-major:
        patterns:
          - "*"
        update-types:
          - major
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-i18n"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "keycloak-js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "connect-history-api-fallback"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "📦 Dependencies"
    assignees:
      - lissy93
    commit-message:
      prefix: "⬆️ "
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - "📦 Dependencies"
    assignees:
      - lissy93
    commit-message:
      prefix: "⬆️ "
      include: scope
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: monthly
    labels:
      - "📦 Dependencies"
    assignees:
      - lissy93
    commit-message:
      prefix: "⬆️ "
      include: scope
